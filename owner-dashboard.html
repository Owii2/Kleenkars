<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kleenkars Owner Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#070707;
color:#fff;
}

.wrap{
max-width:1280px;
margin:auto;
padding:24px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.logo{
font-size:32px;
font-weight:900;
color:#e50914;
}

.btn{
padding:12px 18px;
background:#e50914;
color:#fff;
text-decoration:none;
border-radius:12px;
font-weight:800;
}

h1{
margin-top:22px;
font-size:34px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:24px;
}

.card{
background:#111;
border:1px solid #222;
padding:22px;
border-radius:20px;
}

.label{
color:#aaa;
font-size:14px;
margin-bottom:10px;
}

.num{
font-size:34px;
font-weight:900;
color:#e50914;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:28px;
background:#111;
border-radius:18px;
overflow:hidden;
}

.table th,.table td{
padding:14px;
border:1px solid #222;
text-align:left;
}

.table th{
color:#aaa;
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div class="logo">KLEENKARS</div>
<a href="index.html" class="btn">Back Website</a>
</div>

<h1>Owner Dashboard</h1>

<div class="grid">

<div class="card">
<div class="label">Today's Revenue</div>
<div class="num" id="rev">₹0</div>
</div>

<div class="card">
<div class="label">Bookings Today</div>
<div class="num" id="book">0</div>
</div>

<div class="card">
<div class="label">Repeat Customers</div>
<div class="num" id="rep">0</div>
</div>

<div class="card">
<div class="label">Active Memberships</div>
<div class="num" id="mem">0</div>
</div>

</div>

<table class="table">
<thead>
<tr>
<th>Top Service</th>
<th>Bookings</th>
<th>Revenue</th>
</tr>
</thead>

<tbody id="rows">
<tr>
<td>Loading...</td>
<td>-</td>
<td>-</td>
</tr>
</tbody>

</table>

</div>

<script>
async function loadDashboard(){

try{

const res = await fetch('/.netlify/functions/get-owner-dashboard');
const data = await res.json();

document.getElementById("rev").innerText =
"₹" + data.revenue;

document.getElementById("book").innerText =
data.bookings;

document.getElementById("rep").innerText =
data.repeat;

document.getElementById("mem").innerText =
data.memberships;

let html = "";

data.top.forEach(item => {

html += `
<tr>
<td>${item.service}</td>
<td>${item.bookings}</td>
<td>₹${item.revenue}</td>
</tr>
`;

});

document.getElementById("rows").innerHTML = html;

}catch(e){

document.getElementById("rows").innerHTML =
"<tr><td colspan='3'>Failed to load data</td></tr>";

}

}

loadDashboard();
</script>

</body>
</html>
