<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Owner Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#070707;color:#fff}
.wrap{max-width:1280px;margin:auto;padding:24px}
.logo{font-size:32px;font-weight:900;color:#e50914}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-top:20px}
.card{background:#111;border:1px solid #222;padding:22px;border-radius:20px}
.num{font-size:34px;font-weight:900;color:#e50914}
.table{width:100%;border-collapse:collapse;margin-top:20px}
.table th,.table td{padding:12px;border:1px solid #222;text-align:left}
.btn{padding:12px 18px;background:#e50914;color:#fff;text-decoration:none;border-radius:12px;font-weight:800}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="card">
<h3>Create Employee</h3>

<input id="ename" placeholder="Name">
<input id="ephone" placeholder="Phone">
<input id="euser" placeholder="Username">
<input id="epass" placeholder="Password">

<select id="erole">
<option value="employee">Staff</option>
<option value="manager">Manager</option>
</select>

<button onclick="createEmp()">Create</button>

<p id="empmsg"></p>
</div>
<div class="wrap">

<div class="top">
<div class="logo">KLEENKARS</div>
<a href="index.html" class="btn">Back Website</a>
</div>

<h1>Owner Dashboard</h1>

<div class="grid">

<div class="card">
<div>Today's Bookings</div>
<div class="num" id="book">0</div>
</div>

<div class="card">
<div>Today's Revenue</div>
<div class="num" id="rev">₹0</div>
</div>

<div class="card">
<div>Staff Present</div>
<div class="num" id="staff">0</div>
</div>

</div>

<div class="card">
<h3>Recent Bookings</h3>
<table class="table">
<thead>
<tr>
<th>Name</th>
<th>Service</th>
<th>Vehicle</th>
<th>Price</th>
</tr>
</thead>
<tbody id="rows1"></tbody>
</table>
</div>

<div class="card">
<h3>Attendance Log</h3>
<table class="table">
<thead>
<tr>
<th>Employee</th>
<th>Status</th>
<th>Check In</th>
<th>Check Out</th>
</tr>
</thead>
<tbody id="rows2"></tbody>
</table>
</div>

</div>

<script>
async function load(){

const res = await fetch('/api/owner-dashboard');
const data = await res.json();

book.innerText = data.bookings;
rev.innerText = "₹" + data.revenue;
staff.innerText = data.staff;

let h1 = "";
data.recent.forEach(x=>{
h1 += `
<tr>
<td>${x.name}</td>
<td>${x.service}</td>
<td>${x.vehicle}</td>
<td>₹${x.price}</td>
</tr>`;
});
rows1.innerHTML = h1;

let h2 = "";
data.logs.forEach(x=>{
h2 += `
<tr>
<td>${x.employee_name}</td>
<td>${x.status}</td>
<td>${x.check_in || ''}</td>
<td>${x.check_out || ''}</td>
</tr>`;
});
rows2.innerHTML = h2;

}

load();
</script>

</body>
</html>
