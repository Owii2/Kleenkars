<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kleenkars Customer Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#070707;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
width:100%;
max-width:420px;
background:#111;
border:1px solid #222;
border-radius:24px;
padding:34px;
}

.logo{
font-size:34px;
font-weight:900;
color:#e50914;
margin-bottom:14px;
}

h1{font-size:28px;margin-bottom:8px}

p{color:#aaa;margin-bottom:22px}

input{
width:100%;
padding:14px;
margin-bottom:14px;
border-radius:14px;
border:1px solid #333;
background:#0c0c0c;
color:#fff;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:0;
border-radius:14px;
background:#e50914;
color:#fff;
font-weight:800;
cursor:pointer;
}

#msg{
margin-top:14px;
color:#ff9d9d;
}
</style>
</head>

<body>

<div class="box">

<div class="logo">KLEENKARS</div>

<h1>Customer Login</h1>
<p>Enter your phone number</p>

<input id="phone" placeholder="Phone Number">

<button onclick="go()">Continue</button>

<div id="msg"></div>

</div>

<script>
async function go(){

const phone =
document.getElementById("phone").value.trim();

if(!phone){
document.getElementById("msg").innerText =
"Enter phone number";
return;
}

try{

const res = await fetch('/api/customer-login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({phone})
});

const data = await res.json();

if(data.success){

localStorage.setItem("customerPhone", phone);

location.href="customer-dashboard.html";

}else{

document.getElementById("msg").innerText =
data.error || "Login failed";

}

}catch(e){

document.getElementById("msg").innerText =
"Server error";

}

}
</script>

</body>
</html>
