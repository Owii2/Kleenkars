<head>
  <meta charset="utf-8" />

  <link rel="manifest" href="/manifest.webmanifest">

  <style>
    body{margin:0;font-family:Inter;background:#0b0b12;color:#fff;text-align:center}

<body>

<div class="wrap">
  <h1>KLEENKARS</h1>

  <a href="/customer.html" class="btn">Customer Login</a>
  <a href="/admin.html" class="btn">Employee Login</a>

<!-- ✅ NETLIFY IDENTITY FIX (IMPORTANT) -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
  if (window.netlifyIdentity) {

    // Redirect after login
    window.netlifyIdentity.on("login", () => {
      document.location.href = "/admin/";
    });

    // Handle invite & password setup
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        if (window.location.hash.includes("invite_token") || window.location.hash.includes("recovery_token")) {
          window.netlifyIdentity.open();
        }
      }
    });

    // Force open if token exists
    if (window.location.hash.includes("invite_token") || window.location.hash.includes("recovery_token")) {
      window.netlifyIdentity.open();
    }
  }
</script>

</body>
</html>
