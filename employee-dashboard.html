<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Employee Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#070707;color:#fff}
.wrap{max-width:1000px;margin:auto;padding:24px}
.logo{font-size:30px;font-weight:900;color:#e50914}
.card{background:#111;border:1px solid #222;padding:24px;border-radius:20px;margin-top:20px}
button{padding:14px 18px;border:0;border-radius:12px;background:#e50914;color:#fff;font-weight:800;margin-right:10px}
</style>
</head>
<body>

<div class="wrap">

<div class="logo">KLEENKARS</div>
<h1>Employee Dashboard</h1>

<div class="card">
<h3>Attendance</h3>
<p id="status">Ready</p>

<button onclick="mark('IN')">Clock In</button>
<button onclick="mark('OUT')">Clock Out</button>
</div>

</div>

<script>
async function mark(type){

const username = localStorage.getItem("employeeUser");

const res = await fetch('/api/attendance',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({username,type})
});

const data = await res.json();

status.innerText=data.message;

}
</script>

</body>
</html>
